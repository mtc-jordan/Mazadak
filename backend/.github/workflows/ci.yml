name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Test — pytest with PostgreSQL + Redis services
  # ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mzadak
          POSTGRES_PASSWORD: mzadak
          POSTGRES_DB: mzadak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mzadak"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://mzadak:mzadak@localhost:5432/mzadak_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key
        run: pytest app/tests/ --cov=app --cov-report=xml --cov-fail-under=80 -v --tb=short

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # 2. Lint — ruff + mypy
  # ─────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check app/ --select ALL --ignore E501

      - name: Ruff format check
        run: ruff format --check app/

      - name: Mypy strict type check
        run: mypy app/ --strict

  # ─────────────────────────────────────────────────────────────
  # 3. Security — semgrep + bandit
  # ─────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install semgrep bandit

      - name: Semgrep (Python + FastAPI rules)
        run: semgrep --config=p/python --config=p/fastapi app/ --error

      - name: Bandit (HIGH severity only)
        run: bandit -r app/ -ll

  # ─────────────────────────────────────────────────────────────
  # 4. Build — verify Docker image builds + smoke test
  # ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mzadak-api:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run --rm -d --name mzadak-ci \
            -e DATABASE_URL=sqlite+aiosqlite:///test.db \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e SECRET_KEY=ci-test \
            -p 8000:8000 \
            mzadak-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop mzadak-ci
